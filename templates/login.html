<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }
        .login-box {
            width: 350px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 6px;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔐 Admin Login</h2>

    <form method="POST">
        {{ form.hidden_tag() }}

        {{ form.email.label }}<br>
        {{ form.email(size=32) }}<br><br>
    
        {{ form.password.label }}<br>
        {{ form.password(size=32) }}<br><br>
    
        {{ form.submit() }}
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact - Sterna Transfer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Contactez-nous</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p class="{{ category }}">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="text" name="nom" placeholder="Votre nom" required><br><br>

        <input type="email" name="email" placeholder="Votre email" required><br><br>

        <textarea name="message" placeholder="Votre message" required></textarea><br><br>

        <button type="submit">Envoyer</button>

    </form>

</body>
</html>
